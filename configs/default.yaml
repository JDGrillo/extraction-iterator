pipeline:
  confidence_threshold: 0.75
  missing_value_marker: "not_found"
  max_candidates_per_field: 20
  deterministic_fallback_enabled: true

local_llm:
  enabled: true
  provider: "foundry_local_sdk"
  endpoint: "http://localhost:5764/v1"
  model: "phi-4-mini"
  api_key: ""
  timeout_seconds: 600
  temperature: 0.0
  app_name: "doc-extract-agentic"
  auto_download_model: true

local_llm_profiles:
  proposer:
    model: "phi-4-mini"
    temperature: 0.2
  critic:
    model: "phi-4-mini"
    temperature: 0.0

two_model_learning:
  enabled: true
  proposer_profile: "proposer"
  critic_profile: "critic"
  critic_rounds: 1
  stop_on_no_change: true
  proposer_max_rules: 8
  critic_max_rules: 4
  proposer_min_confidence: 0.5
  critic_min_confidence: 0.65
  handoff_history_path: ".cache/handoff/handoff_events.jsonl"

llm_extractor:
  max_examples: 1
  retrieval_mode: "hybrid"
  default_confidence: 0.95
  max_sheets: 1
  max_rows_per_sheet: 80
  max_cols_per_sheet: 30
  max_cell_chars: 120
  example_store: "./examples/training_examples.jsonl"

auto_learning:
  enabled: true
  auto_promote_examples: true
  promote_split: "train"
  min_row_accuracy: 0.98
  min_labeled_fields: 2
  max_promoted_per_iteration: 50
  field_promotion:
    block_on_any_regression: true
    critical_fields: []
    allowed_regressed_fields: []

auto_iteration:
  max_iterations: 6
  target_accuracy: 0.97
  min_improvement_delta: 0.002
  # validation_mode: schema_match | row_count
  validation_mode: "schema_match"
  # A row is considered meaningful when at least this many schema fields are populated.
  row_count_min_populated_fields: 2
  # Use aligned golden rows to guide validation-time adaptation in learning mode.
  golden_guidance_enabled: true
  # When true, row_count metric is computed on golden-guided aligned rows.
  golden_guidance_for_validation: true

learning_diagnostics:
  # Optional and can be slow; enable only when diagnosing deterministic-vs-LLM deltas.
  llm_handoff_enabled: false

extractor_priors:
  llm_native: 1.0
  excel_native: 0.5
  pdf_native: 0.5

field_aliases: {}
