pipeline:
  confidence_threshold: 0.75
  missing_value_marker: "not_found"
  max_candidates_per_field: 20

azure_content_understanding:
  enabled: false
  mode: fallback_only
  # To enable Azure CU:
  # 1. Create an Azure Document Intelligence resource in the Azure Portal
  # 2. Get your endpoint URL and API key
  # 3. Set them here (or use environment variables: AZURE_CU_ENDPOINT, AZURE_CU_API_KEY)
  # 4. Set enabled: true
  endpoint: ""  # e.g., https://my-resource.cognitiveservices.azure.com/
  api_key: ""   # Get from Azure Portal
  model: "prebuilt-document"  # Model to use for extraction

llm_improvement:
  enabled: false
  provider: openai_compatible
  # Optional and disabled by default.
  # If enabled, suggestions are merged with deterministic suggestions.
  # You can use environment variables instead of hardcoding secrets:
  # LLM_IMPROVEMENT_ENDPOINT, LLM_IMPROVEMENT_API_KEY
  endpoint: ""  # e.g., https://api.openai.com/v1
  api_key: ""
  model: "gpt-4o-mini"
  timeout_seconds: 30
  max_fields: 20
  alias_promotion:
    enabled: true
    min_confirmed_runs: 2
    min_docs_per_run: 2
    min_doc_ratio: 0.15

auto_iteration:
  max_iterations: 5
  target_success_rate: 0.85
  min_improvement_delta: 0.05
  target_confidence: 0.75
  critical_field_threshold: 0.5

extractor_priors:
  excel_native: 0.95
  pdf_native: 0.85
  azure_cu: 0.80

field_aliases:
  invoice_number: ["invoice number", "invoice #", "inv no", "invoice no"]
  invoice_date: ["invoice date", "date"]
  total_amount: ["total", "amount due", "invoice total", "grand total"]
